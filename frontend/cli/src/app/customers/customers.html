<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a routerLink="/" class="text-decoration-none text-secondary hover-primary transition-base">
                    <i class="fa fa-home me-1"></i> Home
                </a>
            </li>
            <li class="breadcrumb-item active fw-medium text-dark" aria-current="page">Clientes</li>
        </ol>
    </nav>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <div
            class="card-header bg-white border-bottom pt-4 px-4 pb-3 d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h4 class="mb-1 fw-bold text-dark tracking-tight">Directorio de Clientes</h4>
                <p class="text-muted small mb-0">Gestiona las empresas registradas en el sistema.</p>
            </div>

            <a routerLink="/customers/new"
                class="btn btn-primary px-4 fw-medium shadow-sm transition-base d-flex align-items-center">
                <i class="fa fa-plus me-2"></i> Nuevo Cliente
            </a>
        </div>

        <div class="card-body px-4 py-3 bg-light">
            <div class="row">
                <div class="col-md-5 col-lg-4">
                    <div class="input-group input-group-modern shadow-sm">
                        <span class="input-group-text bg-white border-end-0 text-muted">
                            <i class="fa fa-search"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 ps-0 bg-white"
                            placeholder="Buscar por Razón Social o CUIT...">
                    </div>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover align-middle custom-table mb-0">
                <thead class="bg-white">
                    <tr>
                        <th scope="col"
                            class="text-secondary small fw-bold text-uppercase tracking-wide px-4 py-3 border-bottom">
                            Razón Social</th>
                        <th scope="col"
                            class="text-secondary small fw-bold text-uppercase tracking-wide py-3 border-bottom">CUIT
                        </th>
                        <th scope="col"
                            class="text-secondary small fw-bold text-uppercase tracking-wide py-3 border-bottom">
                            Observaciones</th>
                        <th scope="col"
                            class="text-secondary small fw-bold text-uppercase tracking-wide px-4 py-3 border-bottom text-end">
                            Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let customer of resultsPage.content">
                        <td class="px-4 py-3">
                            <span class="fw-medium text-dark">{{ customer.companyName }}</span>
                        </td>
                        <td class="py-3">
                            <span class="font-monospace text-secondary">{{ customer.cuit }}</span>
                        </td>
                        <td class="py-3 text-muted small text-truncate" style="max-width: 250px;">
                            {{ customer.observations || '-' }}
                        </td>
                        <td class="px-4 py-3 text-end">
                            <div class="d-flex justify-content-end gap-2">

                                <a routerLink="/customers/{{customer.id}}"
                                    class="btn btn-sm btn-icon text-primary hover-primary border-0 bg-transparent"
                                    title="Editar">
                                    <i class="fas fa-pencil-alt"></i> </a>

                                <button (click)="delete(customer.id)"
                                    class="btn btn-sm btn-icon text-danger hover-danger border-0 bg-transparent"
                                    title="Eliminar">
                                    <i class="fas fa-trash"></i>
                                </button>

                            </div>
                        </td>
                    </tr>

                    <tr *ngIf="!resultsPage.content || resultsPage.content.length === 0">
                        <td colspan="4" class="text-center py-5 text-muted">
                            <i class="fa fa-folder-open fs-2 mb-3 text-light"></i>
                            <p class="mb-0">No se encontraron clientes.</p>
                        </td>
                    </tr>
                </tbody>
                <tfoot class="bg-white" [hidden]="resultsPage.numberOfElements < 1">
                    <tr>
                        <td colspan="100%" class="border-0 py-3 px-4 shadow-sm-top rounded-bottom-4">

                            <app-pagination [totalPages]="resultsPage.totalPages" [currentPage]="currentPage"
                                (pageChangeRequested)="onPageChangeRequested($event)" [number]="resultsPage.number">
                            </app-pagination>

                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>

    </div>
</div>

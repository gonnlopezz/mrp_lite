<nav aria-label="Page navigation">
  <ul class="pagination pagination-sm mb-0">
    
    <li class="page-item" [class.disabled]="number === 0">
      <a class="page-link shadow-none" (click)="onPageChange(-2)" role="button">
        <i class="fas fa-angle-double-left"></i>
      </a>
    </li>

    <li class="page-item" [class.disabled]="number === 0">
      <a class="page-link shadow-none" (click)="onPageChange(-1)" role="button">
        <i class="fas fa-angle-left"></i>
      </a>
    </li>

    <li class="page-item" *ngFor="let t of visiblePages" [class.active]="t === number">
      <a class="page-link shadow-none" (click)="onPageChange(t+1)" role="button">
        {{ t + 1 }}
      </a>
    </li>

    <li class="page-item" [class.disabled]="number === totalPages - 1">
      <a class="page-link shadow-none" (click)="onPageChange(-3)" role="button">
        <i class="fas fa-angle-right"></i>
      </a>
    </li>

    <li class="page-item" [class.disabled]="number === totalPages - 1">
      <a class="page-link shadow-none" (click)="onPageChange(-4)" role="button">
        <i class="fas fa-angle-double-right"></i>
      </a>
    </li>

  </ul>
</nav>

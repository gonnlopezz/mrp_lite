<div class="container py-3">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0" style="font-size: 0.85rem;">
            <li class="breadcrumb-item">
                <a routerLink="/" class="text-decoration-none link-color text-slate transition-base">
                    <i class="fas fa-home me-1"></i> Home
                </a>
            </li>
            <li class="breadcrumb-item">
                <a routerLink="/workshops" class="text-decoration-none link-color text-slate transition-base"> Talleres </a>
            </li>
            <li class="breadcrumb-item active fw-semibold text-steel" aria-current="page">Tipos de Equipo</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-8">

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

                <div
                    class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-steel tracking-tight">Tipos de Equipo</h5>

                    <button class="btn btn-primary shadow-sm transition-base" (click)="openModal(typeModal)">
                        <i class="fas fa-plus me-2"></i> Nuevo
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle custom-table mb-0">
                        <thead>
                            <tr>
                                <th class="px-4">Nombre de Categoría</th>
                                <th class="px-4 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let type of resultsPage.content" class="animate__fadeIn">
                                <td class="px-4">
                                    <div class="d-flex align-items-center">
                                        <div class="dot bg-light border"></div>
                                        <span class="fw-semibold text-steel small tracking-wide">
                                            {{ type.nombre }}
                                        </span>
                                    </div>
                                </td>
                                <td class="px-4 text-center">
                                    <button (click)="delete(type.id)" class="btn-icon hover-danger" title="Eliminar">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                            <tr *ngIf="!resultsPage.content || resultsPage.content.length === 0">
                                <td colspan="2" class="text-center py-5 text-muted">
                                    <i class="fas fa-layer-group fs-2 mb-2 opacity-25"></i>
                                    <p class="small mb-0">No hay categorías registradas.</p>
                                </td>
                            </tr>
                        </tbody>
                        <tfoot class="bg-white border-top table-footer-compact" [hidden]="resultsPage.numberOfElements < 1">
                            <tr>
                                <td colspan="4" class="py-3 px-4">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <span class="text-muted small">Total: <b>{{resultsPage.totalElements}}</b>
                                            {{ resultsPage.totalElements > 1 ? ' categorías' : ' categoría' }}</span>
                                        <app-pagination [totalPages]="resultsPage.totalPages"
                                            [currentPage]="currentPage"
                                            (pageChangeRequested)="onPageChangeRequested($event)"
                                            [number]="resultsPage.number">
                                        </app-pagination>
                                    </div>
                                </td>
                            </tr>
                        </tfoot>
                    </table>
                </div>


            </div>

        </div>
    </div>
</div>
<ng-template #typeModal let-modal>
    <div class="modal-header border-0 pt-4 px-4 pb-0">
        <h6 class="fw-bold mb-0 text-steel text-uppercase tracking-wider" style="font-size: 0.75rem;">
            Nueva Categoría
        </h6>
        <button type="button" class="btn-close shadow-none" (click)="modal.dismiss()"
            style="font-size: 0.7rem;"></button>
    </div>

    <div class="modal-body px-4 pt-3">
        <label class="label-caps mb-2 d-block">Nombre del Tipo de Equipo</label>
        <div class="input-group input-group-sm">
            <span class="input-group-text bg-slate-50 border-end-0 text-muted">
                <i class="fas fa-tag"></i>
            </span>
            <input type="text" class="form-control border-start-0 ps-0 bg-white" [(ngModel)]="newEquipmentType.nombre"
                placeholder="Ej. Herramientas Eléctricas" (keyup.enter)="save(modal)">
        </div>
    </div>

    <div class="modal-footer border-0 pb-4 px-4 pt-3">
        <button type="button" class="btn btn-light px-3 text-slate fw-semibold border-0 bg-transparent"
            (click)="modal.dismiss()" style="font-size: 0.8rem;">
            Cancelar
        </button>
        <button type="button" class="btn btn-primary px-4 fw-bold shadow-sm" (click)="save(modal)"
            [disabled]="!newEquipmentType.nombre.trim()">
            Confirmar Registro
        </button>
    </div>
</ng-template>

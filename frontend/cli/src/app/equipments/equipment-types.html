<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a routerLink="/" class="text-decoration-none text-secondary hover-primary transition-base">
                    <i class="fa fa-home me-1"></i> Home
                </a>
            </li>
            <li class="breadcrumb-item active fw-medium text-dark" aria-current="page">Tipos de equipo</li>
        </ol>
    </nav>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8 col-xl-10">
            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

                <div
                    class="card-header bg-white border-bottom py-3 px-4 d-flex justify-content-between align-items-center">
                    <div>
                        <h4 class="mb-0 fw-bold text-dark tracking-tight">Tipos de Equipo</h4>
                    </div>
                    <button (click)="toggleCreateForm()" class="btn btn-m px-3 fw-medium transition-base rounded-3"
                        [ngClass]="showCreateForm ? 'btn-light text-danger border' : 'btn-primary'">
                        <i class="fas me-1" [ngClass]="showCreateForm ? 'fa-times' : 'fa-plus'"></i>
                        {{ showCreateForm ? 'Cancelar' : 'Nuevo' }}
                    </button>
                </div>

                <div class="card-body p-4 bg-light-subtle border-bottom animate__animated animate__fadeIn"
                    *ngIf="showCreateForm">
                    <div class="row g-3 justify-content-center">
                        <div class="col-12 col-md-8 col-lg-6"> <label
                                class="form-label fw-bold text-secondary small text-uppercase tracking-wider">
                                Nombre de la Categoría
                            </label>

                            <div class="d-flex gap-2">
                                <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                    <span class="input-group-text bg-white border-end-0 text-primary">
                                        <i class="fas fa-tag"></i>
                                    </span>
                                    <input type="text" class="form-control border-start-0 ps-0 bg-white"
                                        placeholder="Ej: Amoladora..." [(ngModel)]="newEquipmentType.name"
                                        (keyup.enter)="save()">
                                </div>

                                <button (click)="save()" class="btn btn-success px-4 fw-bold shadow-sm transition-base"
                                    [disabled]="!newEquipmentType.name.trim()">
                                    <i class="fas fa-check"></i>
                                </button>
                            </div>

                            <div class="form-text mt-2 small text-muted">
                                Presiona <span class="badge bg-light text-dark border">Enter</span> para guardar
                                rápidamente.
                            </div>

                        </div>
                    </div>
                </div>  

                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light-subtle">
                            <tr>
                                <th class="text-secondary small fw-bold text-uppercase px-4 py-3">Nombre</th>
                                <th class="text-secondary small fw-bold text-uppercase px-4 py-3 text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let type of resultsPage.content">
                                <td class="px-4 py-3">
                                    <span class="fw-semibold text-dark text-uppercase small tracking-wide">
                                        {{ type.name }}
                                    </span>
                                </td>
                                <td class="px-4 py-3 text-end">
                                    <button (click)="delete(type.id)" class="btn btn-sm btn-icon-danger">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <tfoot class="bg-white border-top">
                    <tr>
                        <td colspan="2" class="py-3 px-4">
                            <app-pagination [totalPages]="resultsPage.totalPages" [currentPage]="currentPage"
                                (pageChangeRequested)="onPageChangeRequested($event)" [number]="resultsPage.number">
                            </app-pagination>
                        </td>
                    </tr>
                </tfoot>

            </div>
            <div class="text-center mt-3">
                <small class="text-muted">Total de categorías: <b>{{resultsPage.totalElements}}</b></small>
            </div>

        </div>
    </div>
</div>

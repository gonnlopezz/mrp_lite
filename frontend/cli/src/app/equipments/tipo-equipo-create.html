<div class="container py-4">
  <nav aria-label="breadcrumb" class="mb-4">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a routerLink="/" class="text-decoration-none text-secondary">
          <i class="fa fa-home me-1"></i> Home
        </a>
      </li>
      <li class="breadcrumb-item">
        <a routerLink="/tipos-equipo" class="text-decoration-none text-secondary">
          <i class="fa fa-cogs me-1"></i> Tipos de Equipo
        </a>
      </li>
      <li class="breadcrumb-item active fw-medium text-dark" aria-current="page">Nuevo</li>
    </ol>
  </nav>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-6"> <div class="card border-0 shadow-sm rounded-4 overflow-hidden">

        <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-0">
          <div class="d-flex align-items-center"> 
            <div>
              <h4 class="mb-1 fw-bold text-dark tracking-tight">Registrar Tipo de Equipo</h4>
              <p class="text-muted small mb-0">Definí una nueva categoría de herramientas o máquinas.</p>
            </div>
          </div>
        </div>

        <div class="card-body p-4">
          <form>
            <div class="row g-4">
              <div class="col-12">
                <label for="inputNombreEquipo" class="form-label fw-semibold text-secondary small text-uppercase">
                  Nombre del Equipo
                </label>
                <div class="input-group">
                  <input type="text" class="form-control" id="inputNombreEquipo" name="nombre"
                         placeholder="Ej: Amoladora, Taladro de banco..."
                         [(ngModel)]="equipmentType.nombre">
                </div>
              </div>
            </div>

            <hr class="my-4 text-muted opacity-25">

            <div class="d-flex justify-content-end gap-3">
              <button type="button" class="btn btn-light px-4 fw-medium text-secondary hover-dark transition-base" (click)="goBack()">
                Cancelar
              </button>
              <button type="button" class="btn btn-primary px-4 fw-medium shadow-sm transition-base d-flex align-items-center" (click)="save()">
                <i class="fa fa-save me-2"></i> Guardar
              </button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>
</div>

<header class="navbar navbar-expand-lg bg-dark-mrp mb-4 shadow-sm py-2">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center me-4 transition-base" routerLink="/">
            <i class="fas fa-ticket-alt me-2" style="color: var(--mrp-link)"></i>
            <span class="fw-bold tracking-tight text-white">{{title}}</span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
            data-bs-target="#mrpNavbar" style="filter: invert(1);">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mrpNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 nav-separador">

                <li class="nav-item dropdown me-2" ngbDropdown #customersDrop="ngbDropdown"
                    (mouseenter)="customersDrop.open()" (mouseleave)="customersDrop.close()">
                    <a class="nav-link dropdown-toggle fw-medium" id="customersDropdown" ngbDropdownToggle
                        role="button">
                        Clientes
                    </a>
                    <ul class="dropdown-menu dropdown-menu-modern border-0 shadow-lg" ngbDropdownMenu>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="customers">
                                <i class="fas fa-list-ul me-2"></i> Listar
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="customers/new">
                                <i class="fas fa-plus me-2"></i> Nuevo
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item dropdown me-2" ngbDropdown #workshopsDrop="ngbDropdown"
                    (mouseenter)="workshopsDrop.open()" (mouseleave)="workshopsDrop.close()">
                    <a class="nav-link dropdown-toggle fw-medium" id="workshopsDropdown" ngbDropdownToggle
                        role="button">
                        Talleres
                    </a>
                    <ul class="dropdown-menu dropdown-menu-modern border-0 shadow-lg" ngbDropdownMenu>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="workshops">
                                <i class="fas fa-list-ul me-2"></i> Listar
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="workshops/equipment-types">
                                <i class="fas fa-toolbox me-2"></i> Tipos de Equipo
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item dropdown me-2" ngbDropdown #productsDrop="ngbDropdown"
                    (mouseenter)="productsDrop.open()" (mouseleave)="productsDrop.close()">
                    <a class="nav-link dropdown-toggle fw-medium" id="productsDropdown" ngbDropdownToggle role="button">
                        Productos
                    </a>
                    <ul class="dropdown-menu dropdown-menu-modern border-0 shadow-lg" ngbDropdownMenu>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="products">
                                <i class="fas fa-list-ul me-2"></i> Listar
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="products/new">
                                <i class="fas fa-plus me-2"></i> Nuevo
                            </a>
                        </li>
                    </ul>
                </li>
                <li class="nav-item dropdown me-2" ngbDropdown #planningsDrop="ngbDropdown"
                    (mouseenter)="planningsDrop.open()" (mouseleave)="planningsDrop.close()">
                    <a class="nav-link dropdown-toggle fw-medium" id="planningsDropdown" ngbDropdownToggle
                        role="button">
                        Planificaciones
                    </a>
                    <ul class="dropdown-menu dropdown-menu-modern border-0 shadow-lg" ngbDropdownMenu>
                        <li>
                            <a class="dropdown-item d-flex align-items-center" routerLink="plannings">
                                <i class="fas fa-list-ul me-2"></i> Ver todas
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</header>

<main class="container py-0 animate__fadeIn">
    <router-outlet></router-outlet>
</main>

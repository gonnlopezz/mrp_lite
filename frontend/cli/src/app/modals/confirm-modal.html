<div class="modal-body p-4 text-center">
  <div class="icon-badge mb-3 mx-auto" 
       [class.bg-danger-soft]="isDelete" 
       [class.text-danger]="isDelete"
       [class.bg-warning-soft]="!isDelete"
       [class.text-warning]="!isDelete">
    
    <i [class]="isDelete ? 'fas fa-trash-alt fs-2' : 'fas fa-exclamation-triangle fs-2'"></i>
  </div>

  <h5 class="fw-bold text-steel tracking-tight mb-2">{{ title }}</h5>
  <p class="text-muted small mb-0 px-3">{{ message }}</p>

  <div class="d-flex justify-content-center gap-2 mt-4">
    <button type="button" class="btn btn-light px-4 fw-semibold text-secondary border-0" 
            (click)="activeModal.close(false)">
      {{ btnCancelText }}
    </button>
    
    <button type="button" class="btn px-4 fw-bold shadow-sm" 
            [class.btn-danger]="isDelete"
            [class.btn-primary]="!isDelete"
            (click)="activeModal.close(true)">
      {{ btnOkText }}
    </button>
  </div>
</div>

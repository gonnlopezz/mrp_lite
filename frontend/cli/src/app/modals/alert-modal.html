<div class="modal-body p-4 text-center">
  <div class="icon-badge mb-3 mx-auto bg-danger-soft text-danger">
    <i class="fas fa-exclamation-circle fs-2"></i>
  </div>

  <h5 class="fw-bold text-steel tracking-tight mb-2">{{ title }}</h5>
  <p class="text-muted small mb-0 px-3">{{ message }}</p>

  <div class="d-flex justify-content-center gap-2 mt-4">
    <button type="button" class="btn btn-danger px-4 fw-bold shadow-sm" (click)="activeModal.close()">
      Aceptar
    </button>
  </div>
</div>
